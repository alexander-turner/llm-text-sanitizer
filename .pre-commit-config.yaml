# Run with: `pre-commit run --all-files` (or install with `pre-commit install`).
# CI runs this via `.github/workflows/pre-commit.yaml` regardless of whether
# contributors have pre-commit installed locally. The existing `.hooks/pre-commit`
# handles staged-file formatting via lint-staged on every commit; this config
# adds wider hygiene checks (shellcheck, large-file detection, JSON/YAML
# validity, etc.) that aren't covered there.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^pnpm-lock\.yaml$
      - id: end-of-file-fixer
        exclude: ^pnpm-lock\.yaml$
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-case-conflict
      - id: check-symlinks
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [-x, -P, .claude/hooks]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: [-i, "2", -w]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # ci-truth-serum: catch CI "lies" — pipelines that report success while the
  # real work failed, required checks that silently never report, and artifacts
  # pinned to mutable names. No published tag yet, so rev is the main HEAD SHA
  # (pinned per the "SHA-pin third-party sources" rule). ALL hooks enabled:
  # Tier 1 (honesty + identity), Tier 2 (opinionated — this repo follows the
  # decide/reporter + cancel-in-progress conventions they assume), and Extras.
  - repo: https://github.com/alexander-turner/ci-truth-serum
    rev: 0d932b98e1384685ec289b8f7bb2df760ebfb8af # main (no tagged release yet)
    hooks:
      # Tier 1 · Honesty
      - id: check-workflow-pipefail
      - id: check-exit-suppression
      - id: check-stderr-suppression
      - id: check-pr-paths
      # Tier 1 · Identity
      - id: check-pinned-base-images
      - id: check-pinned-downloads
      # Tier 2 · Opinionated
      - id: check-always-reporter
      - id: check-inline-run-length
      - id: check-concurrency
      - id: check-static-concurrency
      # Extras
      - id: check-symlinks
      - id: check-unnamed-regex-groups
      - id: check-global-stdio-swap

  - repo: local
    hooks:
      - id: zizmor
        name: zizmor (GitHub Actions security audit)
        entry: zizmor
        language: python
        additional_dependencies: ["zizmor==1.25.2"]
        pass_filenames: false
        args: [".github/"]
        files: ^\.github/

      - id: validate-config
        name: validate Claude hook configuration
        entry: bash .github/scripts/validate-config.sh
        language: system
        pass_filenames: false
        files: ^(\.claude/|\.hooks/|\.github/workflows/)

      - id: lint-skills
        name: lint Claude SKILL.md files
        entry: bash .hooks/lint-skills.sh
        language: system
        files: ^\.claude/skills/.*\.md$
