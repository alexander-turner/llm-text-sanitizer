version: 2
updates:
  # JS runtime + dev dependencies (package.json / pnpm-lock.yaml).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Disable routine version-bump PRs entirely; Dependabot still raises
    # security updates regardless of this limit.
    open-pull-requests-limit: 0
    commit-message:
      prefix: "chore"
      include: "scope"
    # Wait this many days after a release before proposing it, so a freshly
    # compromised just-published version isn't pulled in immediately (zizmor
    # dependabot-cooldown).
    cooldown:
      default-days: 7
    # Collapse every security update for this ecosystem into a single PR
    # instead of one PR per advisory.
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  # Pinned GitHub Actions SHAs across .github/workflows and .github/actions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "ci"
    cooldown:
      default-days: 7
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"

  # Python dev dependencies declared in pyproject.toml (pytest, etc.).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
    groups:
      pip-security:
        applies-to: security-updates
        patterns:
          - "*"
