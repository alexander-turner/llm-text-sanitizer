name: Node tests

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
      - "**/*.cjs"
      - "**/*.mts"
      - "**/*.cts"
      - "**/tsconfig*.json"
      - "package.json"
      - ".github/workflows/node-tests.yaml"
  # No paths filter on pull_request: this is a Required check, and a workflow-level
  # path filter would skip the whole workflow (including the node-tests-passed
  # reporter) on PRs that don't touch these paths, stranding the check at
  # "Expected — Waiting". The job below cheaply no-ops via script-configured.sh.
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    # The package declares `engines.node >= 20`, so exercise the floor (20) and
    # current (22): a regression on the supported floor (a newer V8/regex/API
    # used unguarded) would otherwise only surface in a consumer's environment.
    # `node-tests-passed` below is the stable Required check, so adding matrix
    # legs (which rename this job to `test (20)` / `test (22)`) is safe.
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env
        with:
          node-version: ${{ matrix.node-version }}

      - name: Check if test script is configured
        id: check
        run: |
          if bash .github/scripts/script-configured.sh test; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Test script not configured, skipping tests"
          fi

      - name: Run tests
        if: steps.check.outputs.configured == 'true'
        run: pnpm test

  # Stable Required check: runs even when `test` is cancelled/skipped, so a
  # protected branch never gets stuck on a check that never reports.
  node-tests-passed: # required-check: true
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
