name: Lint

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
      - "**/*.cjs"
      - "package.json"
      - ".github/workflows/lint.yaml"
  # No paths filter on pull_request: this is a Required check, and a workflow-level
  # path filter would skip the whole workflow (including the lint-passed reporter)
  # on PRs that don't touch these paths, stranding the check at "Expected — Waiting".
  # The job below cheaply no-ops via script-configured.sh when nothing applies.
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env

      - name: Check if scripts are configured
        id: check
        run: |
          if bash .github/scripts/script-configured.sh check; then
            echo "check_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "check_configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Type check script not configured, skipping"
          fi
          if bash .github/scripts/script-configured.sh lint; then
            echo "lint_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "lint_configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Lint script not configured, skipping"
          fi

      - name: Type check
        if: steps.check.outputs.check_configured == 'true'
        run: pnpm check

      - name: Lint
        if: steps.check.outputs.lint_configured == 'true'
        run: pnpm lint

  # Stable Required check: runs even when `lint` is cancelled/skipped, so a
  # protected branch never gets stuck on a check that never reports.
  lint-passed:
    if: always()
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
