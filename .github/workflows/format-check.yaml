name: Format check

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env

      - name: Check formatting
        if: hashFiles('package.json') != ''
        # `prettier --check .` (NOT `pnpm format --check`, which expands the
        # `format` script `prettier --write .` and appends `--check`, so prettier
        # WRITES the checkout then reports success — a gate that can never fail).
        run: pnpm format:check

      - name: Check tracked symlinks are portable
        run: bash .github/scripts/check-symlinks.sh

  # Stable Required check: runs even when `format` is cancelled/skipped, so a
  # protected branch never gets stuck on a check that never reports. Each
  # workflow's gate has a distinct name so it can be marked Required without
  # colliding with the others in branch-protection settings.
  format-check-passed: # required-check: true
    if: always()
    needs: [format]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
