name: Publish Python to PyPI (break-glass)

# Manual fallback for the coupled release. The PRIMARY path publishes PyPI from
# auto-version.yaml alongside the npm release (same version, from the same
# commit) — see that workflow. This one exists only for recovery: if npm
# published and tagged but the PyPI step failed, re-running auto-version is a
# no-op (HEAD is already tagged), so this dispatch-only job rebuilds the wheel at
# the LATEST vX.Y.Z tag and publishes it. It never runs automatically.
#
# One-time PyPI setup (Trusted Publishing has no secret to rotate): on pypi.org,
# add a "pending publisher" for project `agent-input-sanitizer` pointing at this
# repo and workflow file `publish-python.yaml` (no environment). The primary
# auto-version.yaml needs its own publisher entry.
# https://docs.pypi.org/trusted-publishers/

on:
  workflow_dispatch:

concurrency:
  group: publish-python-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          # Full history so the latest vX.Y.Z tag (the release version to
          # rebuild) is reachable by git describe.
          fetch-depth: 0

      # Node + pnpm are needed to bundle the self-contained CLI into the wheel.
      # No dependency caching anywhere in this job: a poisoned cache could tamper
      # with the artifact we ship to PyPI (zizmor cache-poisoning).
      - name: Set up Node.js
        # No `cache:` input, so this does not restore a dependency cache — the
        # cache-poisoning surface zizmor warns about generically is not present.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install Node dependencies
        run: pnpm install

      # Regenerate the bundled CLI from src/; uv build force-includes it into the
      # sdist/wheel (see python/pyproject.toml).
      - name: Bundle the CLI into the Python package
        run: node scripts/bundle-python-cli.mjs

      # Rebuild at the latest release tag so this republishes the SAME version the
      # coupled release computed (the committed pyproject version is a 0.0.0
      # placeholder). Fails loudly if no vX.Y.Z tag exists yet.
      - name: Set the wheel version to the latest release tag
        run: |
          set -euo pipefail
          tag="$(git describe --tags --match 'v*' --abbrev=0)"
          bash scripts/set-pyproject-version.sh "${tag#v}"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Build sdist and wheel
        run: uv build
        working-directory: python

      - name: Check distribution metadata
        run: uvx twine check python/dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: python-dist
          path: python/dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # id-token is scoped to this job only (least privilege): the OIDC token that
    # authenticates to PyPI must not be mintable by the build job.
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
