name: Validate config
on:
  push:
    paths:
      - ".claude/**"
      - ".hooks/**"
      - ".github/workflows/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - ".claude/**"
      - ".hooks/**"
      - ".github/workflows/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env
        with:
          setup-python: "true"

      - name: Validate configuration
        run: bash .github/scripts/validate-config.sh

      - name: Test Claude hooks
        run: uv run --extra dev pytest tests/

  # Stable Required check: runs even when `validate` is cancelled/skipped, so a
  # protected branch never gets stuck on a check that never reports.
  validate-config-passed:
    if: always()
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
